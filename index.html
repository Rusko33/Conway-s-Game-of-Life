<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name ="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta charset="utf-8"/>
        <meta http-equiv="pragma" content="no-cache"/>

        <title>CGoL</title>

        <style>
            /* Reseteo agresivo para anular los estilos que inyecta GameMaker */
            html, body {
                background-color: #000000 !important;
                color: #cccccc;
                margin: 0 !important;
                padding: 0 !important;
                border: 0 !important;
                width: 100vw !important;
                height: 100vh !important;
                overflow: hidden !important; /* Nada de barras de scroll */
                display: flex !important;
                justify-content: center !important;
                align-items: center !important;
            }

            /* Contenedor principal del juego */
            div.gm4html5_div_class {
                margin: 0 !important;
                padding: 0 !important;
                border: 0 !important;
                width: 100% !important;
                height: 100% !important;
                display: flex !important;
                justify-content: center !important;
                align-items: center !important;
                background-color: #000000 !important;
            }

            /* El canvas del juego blindado */
            canvas {
                image-rendering: pixelated !important; /* Mantiene la estética cruda/pixel art */
                -webkit-interpolation-mode: nearest-neighbor !important;
                -ms-touch-action: none;
                touch-action: none;
                margin: 0 !important;
                padding: 0 !important;
                border: 0 !important;
                
                /* Esto asegura que escale manteniendo la proporción original (960x640) */
                max-width: 100vw !important;
                max-height: 100vh !important;
                object-fit: contain !important; 
                
                /* Evita que GameMaker fuerce la posición arriba a la izquierda */
                position: relative !important; 
                top: auto !important;
                left: auto !important;
                transform: none !important;
            }

            /* Estilos de login (por defecto de GMS2, los dejamos por si acaso) */
            div.gm4html5_login {
                padding: 20px;
                position: absolute;
                border: solid 2px #000000;
                background-color: #404040;
                color:#00ff00;
                border-radius: 15px;
                box-shadow: #101010 20px 20px 40px;
            }
        </style>
    </head>

    <body>
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas id="canvas" width="960" height="640">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>

        <script type="text/javascript" src="html5game/CGoL.js?cachebust=1792431865"></script>
        <script>window.onload = GameMaker_Init;</script>
    </body>
</html>
