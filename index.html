<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name ="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta charset="utf-8"/>
        <meta http-equiv="pragma" content="no-cache"/>

        <title>CGoL</title>

        <style>
            body {
                background: #000000; /* Fondo negro corregido */
                color: #cccccc;
                margin: 0;
                padding: 0;
                border: 0;
                /* Estas líneas centran el juego en la pantalla */
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                width: 100vw;
                overflow: hidden; /* Elimina barras de scroll */
            }

            canvas {
                image-rendering: pixelated; /* Mejor para estética retro/indie */
                -webkit-interpolation-mode: nearest-neighbor;
                -ms-touch-action: none;
                touch-action: none;
                margin: 0px;
                padding: 0px;
                border: 0px;
                /* Asegura que el canvas no supere el tamaño de la ventana */
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }

            div.gm4html5_div_class {
                margin: 0px;
                padding: 0px;
                border: 0px;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            /* Estilos de login por si los usas */
            div.gm4html5_login {
                padding: 20px;
                position: absolute;
                border: solid 2px #000000;
                background-color: #404040;
                color:#00ff00;
                border-radius: 15px;
                box-shadow: #101010 20px 20px 40px;
            }
        </style>
    </head>

    <body>
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas id="canvas" width="960" height="640">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>

        <script type="text/javascript" src="html5game/CGoL.js?cachebust=1792431865"></script>
        <script>window.onload = GameMaker_Init;</script>
    </body>
</html>
